global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "discord-notifications"

receivers:
  - name: "discord-notifications"
    discord_configs:
      - webhook_url_file: /etc/alertmanager/discord_webhook
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}'
        message: |-
          {{ range .Alerts -}}
          **{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          {{ end }}
