global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "discord-notifications"

receivers:
  - name: "discord-notifications"
    discord_configs:
      - webhook_url: "YOUR_DISCORD_WEBHOOK_URL"
        title: '{{ .CommonAnnotations.summary }}'
        message: '{{ .CommonAnnotations.description }}'
