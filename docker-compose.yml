volumes:
  prometheus_data: {}
  grafana_data: {}
  loki_data: {}

networks:
  monitoring:
    driver: bridge

services:
  promtail:
    image: grafana/promtail:3.6.11-amd64
    container_name: promtail
    hostname: promtail
    user: root
    volumes:
      - /var/log:/var/log:ro
      - ./promtail:/etc/promtail:ro
      - /var/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - monitoring
    restart: unless-stopped
  loki:
    image: grafana/loki:3.7.2
    container_name: loki
    hostname: loki
    volumes:
      - loki_data:/loki
      - ./loki-config.yml:/etc/loki/local-config.yaml
    command:
      - -config.file=/etc/loki/local-config.yaml
      - -config.expand-env=true
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - monitoring
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    hostname: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.wal-compression"
      - "--web.enable-lifecycle"
    ports:
      - 127.0.0.1:9090:9090
    networks:
      - monitoring
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    hostname: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/udev/data:/run/udev/data:ro
      - /var/lib/node-exporter/textfile:/host/textfile:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)"
      - "--collector.processes"
      - "--collector.interrupts"
      - "--no-collector.systemd"
      - "--collector.textfile.directory=/host/textfile"
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - monitoring
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    hostname: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8088:8080"
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - monitoring
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.32.1
    container_name: alertmanager
    hostname: alertmanager
    volumes:
      - ./alertmanager:/etc/alertmanager
    command:
      - "--config.file=/etc/alertmanager/config.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring
    restart: unless-stopped

  claude-analyzer:
    build: ./analyzer
    container_name: claude-analyzer
    hostname: claude-analyzer
    env_file:
      - path: ./analyzer/.env           # gitignored; holds ANTHROPIC_API_KEY
        required: false                 # missing key fails only this service, not the stack
    environment:
      # Internal Docker wiring (must differ from the code's localhost defaults).
      - PROM_URL=http://prometheus:9090
      - LOKI_URL=http://loki:3100
      # Model + other tunables: set in analyzer/.env (see analyzer/.env.example).
    volumes:
      - ./alertmanager/discord_webhook:/run/discord_webhook:ro
      - ./alertmanager/analyzer_token:/run/analyzer_token:ro   # shared secret; gitignored
    networks:
      - monitoring
    restart: unless-stopped
    # no published port — only Alertmanager reaches it over the monitoring network
