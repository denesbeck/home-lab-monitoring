groups:
  - name: ups_alerts
    rules:
      - alert: PowerOutage
        expr: power_monitor_router_reachable == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Power outage detected"
          description: "Router is unreachable — possible power outage. Consecutive failures: {{ $value }}. Server will shut down after reaching the configured threshold."
